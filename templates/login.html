<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Expense Tracker</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-950 flex items-center justify-center px-4">

    <div class="w-full max-w-md">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-xl p-8">

            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-white">
                    Welcome Back
                </h1>
                <p class="text-slate-400 mt-2">
                    Login to your Expense Tracker
                </p>
            </div>
            <div>
                {% with messages = get_flashed_messages() %} <!-- There should be no spaces between { and %. -->
                     {% if messages %}                        <!--{ % if messages % } -->
                        {% for m in messages %}
                            <div class="mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-300 text-sm">
                                {{ m }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
            </div>

            <form method="POST" action="{{ url_for('login') }}" class="space-y-5">

                <div>
                    <label class="block text-sm text-slate-300 mb-2">
                        Username
                    </label>
                    <input
                        type="text"
                        name="username"
                        required
                        class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    >
                </div>

                <div>
                    <label class="block text-sm text-slate-300 mb-2">
                        Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        required
                        class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-700 text-white focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-semibold transition"
                >
                    Login
                </button>
            </form>

            <p class="text-center text-slate-400 mt-6">
                Don't have an account?
                <a href="{{ url_for('register') }}"
                   class="text-emerald-400 hover:text-emerald-300">
                    Register
                </a>
            </p>

        </div>
    </div>

</body>
</html>
